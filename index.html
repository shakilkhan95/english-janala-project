<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google fonts link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- tailwind + daisyUI cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- title  -->
    <title>English Janala | Best website to learn English</title>
    
    <!-- favicon  -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- external css link  -->
     <link rel="stylesheet" href="./styles/style.css">
    
</head>
<body>
    <!-- header and navbar markup starts here  -->
    <header>
        <div class="navbar bg-base-100 shadow-sm px-10">
            <div class="navbar-start">
                <a href="#" class="flex items-center gap-1">
                    <span class="text-lg font-bold">English</span>
                    <img src="./assets/logo.png" alt="logo">
                    <span class="font-bangla text-lg font-semibold">জানালা</span>
                </a>
            </div>

            <div class="navbar-end lg:flex">
                <ul class="menu menu-horizontal px-1 space-x-3">
                    <li>
                        <a href="#" class="btn btn-soft btn-primary">
                            <i class="fa-solid fa-circle-question"></i> 
                            FAQ
                        </a>
                    </li>

                    <li>
                        <a href="#" class="btn btn-soft btn-primary">
                            <i class="fa-solid fa-book-open"></i>
                            Learn
                        </a>
                    </li>

                    <li>
                        <a href="#" class="btn btn-soft btn-primary">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <!-- hero section starts here  -->
    <section>
        <div class="hero bg-base-100 min-h-screen">
            <div class="hero-content flex-col lg:flex-row-reverse">
                <img src="./assets/hero-student.png"/>
                <div>
                    <h1 class="text-5xl font-bold"><span class="text-sky-500">English</span> is Easy!!</h1>
                    <p class="py-6 font-bangla">
                        আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons
                        আপনাকে নিয়ে যাবে অন্য একটি Level এ
                    </p>

                    <fieldset class="fieldset mb-5">
                        <input type="text" class="input" placeholder="Enter your name" />
                        <input type="password" class="input" placeholder="Password" />
                    </fieldset>

                    <button class="btn btn-primary">Get Started</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
